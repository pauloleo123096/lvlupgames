<!DOCTYPE html>
<html>
<head>
    <title>Neon Balls</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            overflow: hidden;
        }
        canvas {
            background-color: black;
            display: block;
            margin: auto;
            border: 2px solid #0ff;
        }
        #ui {
            margin-top: 10px;
        }
        .button {
            padding: 5px 10px;
            margin: 0 5px;
            cursor: pointer;
            border: 2px solid #0ff;
            background: black;
            color: #0ff;
        }
    </style>
</head>
<body>
    <h1>Neon Balls</h1>
    <canvas id="gameCanvas" width="750" height="500"></canvas>
    <div id="ui">
        <span>Energy: <span id="energy">1</span></span>
        <button class="button" id="plantMode">Plant Mode</button>
        <button class="button" id="eraseMode">Erase Mode</button>
    </div>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const energyDisplay = document.getElementById("energy");
        let gridRows = 3, gridCols = 5, cellSize = 100;
        let offsetX = 50, offsetY = 50;
        let grid = Array(gridRows).fill(null).map(() => Array(gridCols).fill(null));
        let mode = "plant"; 
        let energy = 1;
        let enemies = [];
        let projectiles = [];
        let balls = [];
        let enemySpawnTimer = 0;

        document.getElementById("plantMode").onclick = () => mode = "plant";
        document.getElementById("eraseMode").onclick = () => mode = "erase";

        // Ball Types
        const ballTypes = [
            { color: "#0ff", projectileColor: "#0ff", cost: 3, damage: 1, explode: false },
            { color: "#00f", projectileColor: "#0ff", cost: 3, damage: 3, explode: true }
        ];

        class Ball {
            constructor(row, col, type) {
                this.row = row;
                this.col = col;
                this.type = type;
                this.shootTimer = 0;
            }
            update() {
                this.shootTimer++;
                if (this.shootTimer > 60) {
                    this.shootTimer = 0;
                    projectiles.push(new Projectile(this.col * cellSize + offsetX + cellSize / 2,
                        this.row * cellSize + offsetY + cellSize / 2, this.type));
                }
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.col * cellSize + offsetX + cellSize / 2,
                    this.row * cellSize + offsetY + cellSize / 2, 20, 0, Math.PI * 2);
                ctx.fillStyle = this.type.color;
                ctx.shadowColor = this.type.color;
                ctx.shadowBlur = 20;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        class Projectile {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.type = type;
                this.speed = 4;
                this.damage = type.damage;
                this.explode = type.explode;
            }
            update() {
                this.x += this.speed;
                for (let e of enemies) {
                    if (this.x > e.x && this.x < e.x + 40 && this.y > e.y && this.y < e.y + 40) {
                        e.health -= this.damage;
                        if (this.explode) {
                            enemies = enemies.filter(en => !(Math.abs(en.x - this.x) < 60 && Math.abs(en.y - this.y) < 60));
                        }
                        projectiles.splice(projectiles.indexOf(this), 1);
                        break;
                    }
                }
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, 5, 0, Math.PI * 2);
                ctx.fillStyle = this.type.projectileColor;
                ctx.shadowColor = this.type.projectileColor;
                ctx.shadowBlur = 15;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        class Enemy {
            constructor(row) {
                this.x = canvas.width - 50;
                this.y = row * cellSize + offsetY + cellSize / 2 - 20;
                this.speed = 0.5;
                this.health = 5; // tougher
            }
            update() {
                this.x -= this.speed;
                if (this.x <= offsetX) {
                    alert("Game Over! The enemies reached your base!");
                    document.location.reload();
                }
            }
            draw() {
                ctx.fillStyle = "#f0f";
                ctx.shadowColor = "#f0f";
                ctx.shadowBlur = 15;
                ctx.fillRect(this.x, this.y, 40, 40);
                ctx.shadowBlur = 0;
            }
        }

        // Mouse click to plant or erase
        canvas.addEventListener("click", (e) => {
            let rect = canvas.getBoundingClientRect();
            let mouseX = e.clientX - rect.left;
            let mouseY = e.clientY - rect.top;
            let col = Math.floor((mouseX - offsetX) / cellSize);
            let row = Math.floor((mouseY - offsetY) / cellSize);
            if (col >= 0 && col < gridCols && row >= 0 && row < gridRows) {
                if (mode === "plant" && !grid[row][col] && energy >= 3) {
                    grid[row][col] = new Ball(row, col, ballTypes[Math.floor(Math.random() * ballTypes.length)]);
                    balls.push(grid[row][col]);
                    energy -= 3;
                } else if (mode === "erase" && grid[row][col]) {
                    balls.splice(balls.indexOf(grid[row][col]), 1);
                    grid[row][col] = null;
                }
            }
        });

        function update() {
            balls.forEach(ball => ball.update());
            projectiles.forEach(p => p.update());
            enemies.forEach(e => e.update());
            enemies = enemies.filter(e => e.health > 0);
            projectiles = projectiles.filter(p => p.x < canvas.width);
            enemySpawnTimer++;
            if (enemySpawnTimer > 200) {
                enemies.push(new Enemy(Math.floor(Math.random() * gridRows)));
                enemySpawnTimer = 0;
            }
            if (energy < 10 && Math.random() < 0.01) {
                energy++;
            }
        }

        function drawGrid() {
            ctx.strokeStyle = "#0ff";
            ctx.lineWidth = 1;
            for (let r = 0; r < gridRows; r++) {
                for (let c = 0; c < gridCols; c++) {
                    ctx.strokeRect(c * cellSize + offsetX, r * cellSize + offsetY, cellSize, cellSize);
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawGrid();
            balls.forEach(ball => ball.draw());
            projectiles.forEach(p => p.draw());
            enemies.forEach(e => e.draw());
            energyDisplay.textContent = energy;
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
