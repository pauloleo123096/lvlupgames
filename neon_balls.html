<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Neon Balls Shooter</title>
<style>
  body { margin: 0; background: black; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const shooters = [
  { x: canvas.width / 4, y: canvas.height - 50, color: "cyan" },
  { x: canvas.width * 3/4, y: 50, color: "magenta" }
];

let projectiles = [];

function randomNeonColor() {
  const colors = ["#ff00ff", "#00ffff", "#ffff00", "#ff8800", "#00ff00", "#ff0044"];
  return colors[Math.floor(Math.random() * colors.length)];
}

function shoot(shooter) {
  projectiles.push({
    x: shooter.x,
    y: shooter.y,
    radius: 10,
    color: randomNeonColor(),
    vy: shooter.y < canvas.height / 2 ? 5 : -5,
    trail: []
  });
}

function drawShooter(s) {
  ctx.fillStyle = s.color;
  ctx.beginPath();
  ctx.arc(s.x, s.y, 20, 0, Math.PI * 2);
  ctx.fill();
}

function drawProjectiles() {
  for (let p of projectiles) {
    // Draw trail
    for (let i = 0; i < p.trail.length; i++) {
      const t = p.trail[i];
      ctx.fillStyle = t.color;
      ctx.globalAlpha = t.alpha;
      ctx.beginPath();
      ctx.arc(t.x, t.y, t.radius, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Draw glowing main ball
    ctx.shadowBlur = 20;
    ctx.shadowColor = p.color;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

function update() {
  projectiles.forEach(p => {
    // Update position
    p.y += p.vy;

    // Add trail position
    p.trail.unshift({ 
      x: p.x, 
      y: p.y, 
      radius: p.radius, 
      color: p.color, 
      alpha: 0.5 
    });
    if (p.trail.length > 10) p.trail.pop();

    // Fade trail
    p.trail.forEach(t => t.alpha -= 0.05);
  });

  // Remove off-screen projectiles
  projectiles = projectiles.filter(p => p.y > 0 && p.y < canvas.height);
}

function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  shooters.forEach(drawShooter);
  drawProjectiles();
  update();
  requestAnimationFrame(loop);
}

setInterval(() => shoot(shooters[0]), 500);
setInterval(() => shoot(shooters[1]), 500);

loop();
</script>
</body>
</html>
